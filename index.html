<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stado International</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* The overall page background */
        body {
            background-color: #050505; /* Pitch black background */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center; /* Centers the card vertically */
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* The Card */
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background-color: #121214; /* Dark grey card background */
            padding: 40px 25px;
            border-radius: 24px; /* Rounded corners */
            border: 1px solid #232325; /* Subtle border to define the card */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); /* Soft shadow under the card */
            box-sizing: border-box;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 22px;
            margin: 0 0 5px 0;
            font-weight: 600;
        }
        p {
            font-size: 14px;
            color: #9e9e9e;
            margin: 0 0 25px 0;
            line-height: 1.4;
        }
        .social-icons {
            margin-bottom: 30px;
        }
        .social-icons a {
            color: #ffffff;
            font-size: 22px;
            margin: 0 12px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .social-icons a:hover {
            color: #b3b3b3;
        }

        /* The Buttons inside the card */
        .link-btn {
            display: flex;
            align-items: center;
            background-color: #1c1c1e; /* Slightly lighter than the card */
            color: #ffffff;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 14px;
            margin-bottom: 15px;
            font-size: 15px;
            font-weight: 500;
            transition: background-color 0.2s;
            border: 1px solid #2c2c2e;
        }
        .link-btn:hover {
            background-color: #2c2c2e;
        }
        .link-btn i {
            font-size: 18px;
            width: 30px;
            text-align: left;
        }
        .link-btn span {
            flex-grow: 1;
            text-align: center;
            padding-right: 30px; /* offsets the icon to keep text centered */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="images/STADO LOGO WORK FILE white text.png" alt="Stado International Logo" class="profile-img">
        
        <h1>Stado International</h1>
        <p>An institute of martial arts in Palakkad<br>Karate • Kungfu • Boxing • Zumba</p>

        <div class="social-icons">
            <a href="https://www.linkedin.com/in/stado-international-6a21a539a/?lipi=urn%3Ali%3Apage%3Ad_flagship3_profile_view_base_contact_details%3BZXufiINzScilpO56Z2731g%3D%3D" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a>
            <a href="https://www.instagram.com/stado_international?igsh=dGJjMjQyd2Rpazl6" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://twitter.com/StadoInternational" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="https://www.youtube.com/@StadoInternational" target="_blank"><i class="fa-brands fa-youtube"></i></a>
        </div>

        <a href="https://wa.me/919074505131?text=Hello! I recently came across your martial arts institution and I’m really interested in joining your classes.%0ACould you please share more details about the training programs, timings, and how I can enroll?%0ALooking forward to hearing from you!" target="_blank" class="link-btn">
            <i class="fa-brands fa-whatsapp"></i> 
            <span>Book a Schedule</span>
        </a>

        <a href="https://stado.live" class="link-btn">
            <i class="fa-solid fa-globe"></i>
            <span>Website</span>
        </a>

        <a href="https://maps.google.com/?q=Stado+International" target="_blank" class="link-btn">
            <i class="fa-solid fa-location-dot"></i>
            <span>Locate Us</span>
        </a>

        <a href="https://g.page/r/CbHbRxo15rvaEAE/review" target="_blank" class="link-btn">
            <i class="fa-regular fa-star"></i>
            <span>Share your experience</span>
        </a>

        <a href="tel:+919074505131" class="link-btn">
            <i class="fa-solid fa-phone"></i>
            <span>Contact Us</span>
        </a>
    </div>

</body>
</html>
